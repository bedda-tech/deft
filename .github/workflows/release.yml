name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      # Checkout deft and its local-file dependencies together so that
      # `npm install` can resolve the `file:../react-native-*` paths.
      # Once the packages are published to npm, replace these checkouts
      # with the published versions and switch back to `npm ci`.
      - name: Checkout deft
        uses: actions/checkout@v4
        with:
          path: deft

      - name: Checkout react-native-device-agent
        uses: actions/checkout@v4
        with:
          repository: bedda-tech/react-native-device-agent
          path: react-native-device-agent

      - name: Checkout react-native-accessibility-controller
        uses: actions/checkout@v4
        with:
          repository: bedda-tech/react-native-accessibility-controller
          path: react-native-accessibility-controller

      - name: Checkout react-native-executorch
        uses: actions/checkout@v4
        with:
          repository: bedda-tech/react-native-executorch
          path: react-native-executorch

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: deft
        run: npm install

      - name: Build APK (preview)
        working-directory: deft
        run: eas build --platform android --profile preview --non-interactive --output ../deft-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: deft-${{ github.ref_name }}.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
