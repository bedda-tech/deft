name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deft
        uses: actions/checkout@v4
        with:
          path: deft

      - name: Checkout react-native-device-agent
        uses: actions/checkout@v4
        with:
          repository: bedda-tech/react-native-device-agent
          path: react-native-device-agent

      - name: Checkout react-native-accessibility-controller
        uses: actions/checkout@v4
        with:
          repository: bedda-tech/react-native-accessibility-controller
          path: react-native-accessibility-controller

      - name: Checkout react-native-executorch
        uses: actions/checkout@v4
        with:
          repository: bedda-tech/react-native-executorch
          path: react-native-executorch

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Remove prepare script from executorch (not needed for CI)
        run: |
          node -e "
            const fs = require('fs');
            const path = 'react-native-executorch/packages/react-native-executorch/package.json';
            const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
            delete pkg.scripts.prepare;
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2));
          "

      - name: Install dependencies
        working-directory: deft
        run: npm install --ignore-scripts

      - name: Typecheck
        working-directory: deft
        run: npm run typecheck
