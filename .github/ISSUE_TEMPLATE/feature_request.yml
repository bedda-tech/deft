name: Feature Request
description: Suggest a new app feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for the Deft app? We'd love to hear it.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: App area
      options:
        - Chat interface
        - Voice input
        - History
        - Settings / model management
        - Onboarding
        - Agent overlay
        - Performance
        - Other
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'd be willing to open a PR for this
